<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MyDash</title>

    <!-- ========================================== -->
    <!-- PROTEKSI LOGIN - WAJIB DI AWAL!           -->
    <!-- ========================================== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Loading Screen */
        #auth-loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 50%, #7f1d1d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.5s ease;
        }
        #auth-loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .auth-loader {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spinAuth 1s linear infinite;
        }
        @keyframes spinAuth {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        #auth-loading p {
            color: white;
            font-family: Arial, sans-serif;
            font-size: 16px;
        }

        /* Style dasar dashboard */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #fef2f2;
            margin: 0;
            padding: 0;
        }
        .dashboard-header {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            padding: 20px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .dashboard-header h1 {
            margin: 0;
            font-size: 24px;
        }
        .dashboard-header h1 span {
            font-weight: 300;
        }
        .dashboard-header .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .dashboard-header .user-info .username {
            font-weight: 600;
        }
        .logout-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .dashboard-content {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .welcome-card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        .welcome-card h2 {
            color: #1f2937;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .welcome-card h2 span {
            color: #dc2626;
        }
        .welcome-card p {
            color: #6b7280;
            font-size: 16px;
        }
        .welcome-card .emoji-big {
            font-size: 60px;
            display: block;
            margin-bottom: 15px;
        }
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .feature-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
            text-align: center;
            transition: all 0.3s;
            border-left: 4px solid #dc2626;
        }
        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(220, 38, 38, 0.15);
        }
        .feature-card .icon {
            font-size: 40px;
            color: #dc2626;
            margin-bottom: 10px;
        }
        .feature-card h3 {
            color: #1f2937;
            margin: 10px 0 5px;
        }
        .feature-card p {
            color: #6b7280;
            font-size: 14px;
            margin: 0;
        }
        .feature-card .count {
            font-size: 32px;
            font-weight: 700;
            color: #dc2626;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <!-- ========================================== -->
    <!-- LOADING SCREEN - SELALU TAMPIL DULU        -->
    <!-- ========================================== -->
    <div id="auth-loading">
        <div class="auth-loader"></div>
        <p>⏳ Memeriksa sesi login...</p>
    </div>

    <script>
        // ==========================================
        // PROTEKSI: Cek session di index.html
        // ==========================================
        const SUPABASE_URL = 'https://tnbvpqpchotveesdxuel.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_qE8MGS1eB2c4arvLkZjnpw_aQlEo58N';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkAuth() {
            try {
                console.log('🔒 Checking authentication...');
                const { data: { session }, error } = await supabase.auth.getSession();

                if (error) {
                    console.error('❌ Auth error:', error);
                    window.location.href = 'login.html';
                    return;
                }

                if (!session) {
                    console.log('❌ User belum login, redirect ke login.html');
                    window.location.href = 'login.html';
                    return;
                }

                console.log('✅ User terautentikasi:', session.user.email);

                // Sembunyikan loading screen
                document.getElementById('auth-loading').classList.add('hidden');

                // Tampilkan nama user
                const userName = session.user.user_metadata?.full_name || session.user.email;
                const userElements = document.querySelectorAll('.username');
                userElements.forEach(el => {
                    el.textContent = userName;
                });

            } catch (err) {
                console.error('❌ Error checking auth:', err);
                window.location.href = 'login.html';
            }
        }

        // ==========================================
        // LOGOUT
        // ==========================================
        async function logoutUser() {
            if (confirm('Yakin ingin logout?')) {
                await supabase.auth.signOut();
                window.location.href = 'login.html';
            }
        }

        // ==========================================
        // JALANKAN SAAT HALAMAN DIMUAT
        // ==========================================
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
        });
    </script>

    <!-- ========================================== -->
    <!-- KONTEN DASHBOARD                          -->
    <!-- ========================================== -->
    <div id="dashboard-content">
        <!-- Header -->
        <div class="dashboard-header">
            <h1>📚 My<span>Dash</span></h1>
            <div class="user-info">
                <span class="username">User</span>
                <button class="logout-btn" onclick="logoutUser()">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </div>
        </div>

        <!-- Content -->
        <div class="dashboard-content">
            <div class="welcome-card">
                <span class="emoji-big">👋</span>
                <h2>Selamat Datang, <span class="username">User</span>!</h2>
                <p>Dashboard Kuliah & Keuangan Anda siap digunakan.</p>
            </div>

            <div class="features-grid">
                <div class="feature-card">
                    <div class="icon"><i class="fa-regular fa-calendar-days"></i></div>
                    <h3>Jadwal Kuliah</h3>
                    <div class="count" id="totalSchedule">0</div>
                    <p>Total jadwal aktif</p>
                </div>
                <div class="feature-card">
                    <div class="icon"><i class="fa-solid fa-wallet"></i></div>
                    <h3>Total Saldo</h3>
                    <div class="count" id="totalSaldo">Rp 0</div>
                    <p>Keuangan Anda</p>
                </div>
                <div class="feature-card">
                    <div class="icon"><i class="fa-solid fa-arrow-down" style="color: #16a34a;"></i></div>
                    <h3>Pemasukan</h3>
                    <div class="count" id="totalPemasukan" style="color: #16a34a;">Rp 0</div>
                    <p>Total pemasukan</p>
                </div>
                <div class="feature-card">
                    <div class="icon"><i class="fa-solid fa-arrow-up" style="color: #dc2626;"></i></div>
                    <h3>Pengeluaran</h3>
                    <div class="count" id="totalPengeluaran" style="color: #dc2626;">Rp 0</div>
                    <p>Total pengeluaran</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
