<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MyDash</title>

    <!-- Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Chart.js untuk Grafik -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Flatpickr untuk Kalender -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <style>
        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 50%, #7f1d1d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.5s ease;
        }
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        #loading-screen p {
            color: white;
            font-family: Arial, sans-serif;
            font-size: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fef2f2;
        }

        /* Tema Merah */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        .gradient-bg {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%) !important;
        }

        .stat-card {
            transition: all 0.3s ease;
            cursor: pointer;
            border-left: 4px solid #dc2626 !important;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(220, 38, 38, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%) !important;
            color: white !important;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            box-shadow: 0 8px 25px rgba(220, 38, 38, 0.4) !important;
            transform: translateY(-2px);
        }

        .hide {
            display: none;
        }

        .sidebar-hover:hover {
            transform: translateX(4px);
            transition: all 0.2s;
        }

        .schedule-item {
            transition: all 0.2s ease;
        }
        .schedule-item:hover {
            background-color: #fef2f2;
            transform: scale(1.01);
        }

        .flatpickr-calendar {
            z-index: 1000 !important;
            width: 100% !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1) !important;
            border-radius: 12px !important;
        }
        .flatpickr-innerContainer {
            width: 100% !important;
        }
        .flatpickr-rContainer {
            width: 100% !important;
        }
        .flatpickr-days {
            width: 100% !important;
        }
        .dayContainer {
            width: 100% !important;
            min-width: 100% !important;
            max-width: 100% !important;
        }
        .flatpickr-day {
            max-width: 14.28% !important;
            width: 14.28% !important;
            height: 45px !important;
            line-height: 45px !important;
            font-size: 14px !important;
            border-radius: 8px !important;
            transition: all 0.2s !important;
        }
        .flatpickr-day:hover {
            background: #fecaca !important;
            transform: scale(1.05);
        }
        .flatpickr-day.selected {
            background: #dc2626 !important;
            border-color: #dc2626 !important;
            color: white !important;
        }
        .flatpickr-day.today {
            border-color: #dc2626 !important;
            font-weight: bold !important;
        }
        .flatpickr-day.has-event {
            position: relative;
            font-weight: bold !important;
        }
        .flatpickr-day.has-event .event-dot {
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: 1px solid white;
        }
        .flatpickr-month {
            height: 50px !important;
        }
        .flatpickr-weekday {
            font-weight: 600 !important;
            color: #dc2626 !important;
            font-size: 13px !important;
        }
        .flatpickr-current-month {
            font-size: 16px !important;
            font-weight: 600 !important;
        }

        .repeat-badge {
            background: #fbbf24;
            color: #78350f;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 600;
            margin-left: 8px;
        }

        .color-picker-option {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.2s;
            display: inline-block;
        }
        .color-picker-option:hover {
            transform: scale(1.15);
        }
        .color-picker-option.active {
            border-color: #dc2626;
            box-shadow: 0 0 0 2px #fff, 0 0 0 4px #dc2626;
        }

        .checkbox-custom {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #dc2626;
        }

        .week-input {
            width: 80px;
            padding: 6px 10px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            transition: all 0.2s;
        }
        .week-input:focus {
            outline: none;
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px 4px 8px;
            background: white;
            border-radius: 20px;
            border: 1px solid #e5e7eb;
            transition: all 0.2s;
            cursor: pointer;
        }
        .legend-item:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .calendar-event-item {
            transition: all 0.2s;
            cursor: pointer;
        }
        .calendar-event-item:hover {
            transform: translateX(4px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        /* Modal Edit */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            background: white;
            border-radius: 16px;
            padding: 24px;
            animation: modalIn 0.3s
