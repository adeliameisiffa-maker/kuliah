<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - MyDash</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 50%, #7f1d1d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .reset-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 35px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.6s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            font-size: 48px;
            color: #dc2626;
            margin-bottom: 10px;
        }
        .logo h1 {
            font-size: 28px;
            color: #1f2937;
            font-weight: 700;
        }
        .logo h1 span {
            color: #dc2626;
        }
        .logo p {
            color: #6b7280;
            font-size: 14px;
            margin-top: 4px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group input {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s;
            background: #f9fafb;
        }
        .input-group input:focus {
            outline: none;
            border-color: #dc2626;
            background: white;
            box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.1);
        }
        .btn-reset {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(220, 38, 38, 0.4);
        }
        .btn-reset:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .message.error {
            display: flex;
            color: #dc2626;
            background: #fef2f2;
            border: 1px solid #fecaca;
        }
        .message.success {
            display: flex;
            color: #16a34a;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #6b7280;
        }
        .back-link a {
            color: #dc2626;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 50%, #7f1d1d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.5s ease;
        }
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        #loading-screen p {
            color: white;
            font-family: Arial, sans-serif;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
        <p>⏳ Memeriksa sesi...</p>
    </div>

    <div class="reset-box">
        <div class="logo">
            <div class="logo-icon">
                <i class="fa-solid fa-key"></i>
            </div>
            <h1>Reset <span>Password</span></h1>
            <p>Masukkan password baru Anda</p>
        </div>

        <div id="message" class="message"></div>

        <form id="resetForm">
            <div class="input-group">
                <input type="password" id="newPassword" placeholder="Password baru" required minlength="6">
            </div>
            <div class="input-group">
                <input type="password" id="confirmPassword" placeholder="Konfirmasi password" required>
            </div>
            <button type="submit" class="btn-reset" id="resetBtn">
                <i class="fa-solid fa-key"></i> Update Password
            </button>
        </form>

        <div class="back-link">
            <a href="login.html">← Kembali ke Login</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://tnbvpqpchotveesdxuel.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_qE8MGS1eB2c4arvLkZjnpw_aQlEo58N';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        console.log('🚀 Reset Password page loaded');

        async function checkSession() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) {
                    console.log('❌ No session, redirect to login');
                    window.location.href = 'login.html';
                    return;
                }
                console.log('✅ User session valid:', session.user.email);
                document.getElementById('loading-screen').classList.add('hidden');
            } catch (err) {
                console.error('❌ Error checking session:', err);
                window.location.href = 'login.html';
            }
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            console.log('📝 Reset form submitted');

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('resetBtn');
            const messageEl = document.getElementById('message');

            messageEl.className = 'message';
            messageEl.textContent = '';

            if (newPassword !== confirmPassword) {
                messageEl.className = 'message error';
                messageEl.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Password tidak sama!';
                return;
            }

            if (newPassword.length < 6) {
                messageEl.className = 'message error';
                messageEl.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Password minimal 6 karakter!';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Memproses...`;

            try {
                const { data, error } = await supabase.auth.updateUser({
                    password: newPassword
                });

                if (error) {
                    console.error('❌ Error reset password:', error);
                    messageEl.className = 'message error';
                    messageEl.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> ' + error.message;
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fa-solid fa-key"></i> Update Password`;
                    return;
                }

                console.log('✅ Password updated successfully');
                messageEl.className = 'message success';
                messageEl.innerHTML = '<i class="fa-solid fa-check-circle"></i> Password berhasil diubah! Redirecting...';

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (err) {
                console.error('❌ Error:', err);
                messageEl.className = 'message error';
                messageEl.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Terjadi kesalahan. Silakan coba lagi.';
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-key"></i> Update Password`;
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            checkSession();
        });
    </script>
</body>
</html>
