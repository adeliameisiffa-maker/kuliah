<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl max-w-md w-full shadow-lg">
        <h1 class="text-2xl font-bold text-center mb-4">Reset Password</h1>
        <p class="text-gray-600 text-center mb-6">Masukkan password baru Anda</p>
        
        <form id="resetForm">
            <div class="mb-4">
                <input type="password" id="newPassword" placeholder="Password baru" class="w-full p-3 border rounded-lg" required minlength="6">
            </div>
            <div class="mb-4">
                <input type="password" id="confirmPassword" placeholder="Konfirmasi password" class="w-full p-3 border rounded-lg" required>
            </div>
            <div id="message" class="text-sm mb-4"></div>
            <button type="submit" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-semibold hover:bg-indigo-700">
                Update Password
            </button>
        </form>
    </div>

    <script>
        const supabase = window.supabase.createClient(
            'https://tnbvpqpchotveesdxuel.supabase.co',
            'sb_publishable_qE8MGS1eB2c4arvLkZjnpw_aQlEo58N'
        );

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const message = document.getElementById('message');
            
            if (newPassword !== confirmPassword) {
                message.innerHTML = '<span class="text-red-600">❌ Password tidak sama!</span>';
                return;
            }
            
            if (newPassword.length < 6) {
                message.innerHTML = '<span class="text-red-600">❌ Password minimal 6 karakter!</span>';
                return;
            }
            
            try {
                const { data, error } = await supabase.auth.updateUser({
                    password: newPassword
                });
                
                if (error) {
                    message.innerHTML = `<span class="text-red-600">❌ ${error.message}</span>`;
                } else {
                    message.innerHTML = '<span class="text-green-600">✅ Password berhasil diubah! Silakan login.</span>';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                }
            } catch (err) {
                message.innerHTML = '<span class="text-red-600">❌ Terjadi kesalahan. Silakan coba lagi.</span>';
            }
        });
    </script>
</body>
</html>
